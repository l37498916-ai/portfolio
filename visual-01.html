<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />

  <body class="detail-page visual-detail-page">
    <canvas class="ambient-canvas" aria-hidden="true"></canvas>
    <main>
      <section class="detail-hero detail-reveal visual-work-hero">
        <div>
          <a class="back-link" href="./index.html#visuals">返回视觉探索</a>

        </div>
        <div class="detail-cover asset-frame">

          <video preload="metadata" class="project-video" controls playsinline poster="./assets/visual-01.jpg">

      <section class="detail-section detail-reveal">

            <p>AIGC生成 / 游戏开场 / 视频。</p>
          </article>

          </article>
          <article>
            <h3>延展方向</h3>
            <p>可作为沉浸式叙事项目、游戏菜单开场或互动体验首页的视觉方向实验。</p>
